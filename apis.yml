    against transactions - and download a PDF credit note for an adjustment.
- aid: paddle:paddle-discounts-api
  name: Paddle Discounts API
  tags:
  - Discounts
  - Coupons
  - Promotions
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.paddle.com/api-reference/discounts/overview
  baseURL: https://api.paddle.com
  properties:
  - url: https://developer.paddle.com/api-reference/discounts/overview
    type: Documentation
  - url: https://developer.paddle.com/api-reference/discounts/list-discounts
    type: APIReference
  - url: openapi/paddle-openapi.yml
    type: OpenAPI
  description: Create, read, and update discounts - percentage, flat, and flat-per-seat
    coupon codes with usage limits, expiry, and product or price restrictions -
    applied to checkouts, transactions, and subscriptions.
