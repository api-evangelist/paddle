- aid: paddle:paddle-transactions-api
  name: Paddle Transactions API
  tags:
  - Transactions
  - Checkout
  - Invoices
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.paddle.com/api-reference/transactions/overview
  baseURL: https://api.paddle.com
  properties:
  - url: https://developer.paddle.com/api-reference/transactions/overview
    type: Documentation
  - url: https://developer.paddle.com/api-reference/transactions/list-transactions
    type: APIReference
  - url: openapi/paddle-openapi.yml
    type: OpenAPI
  description: Create, read, update, and preview transactions - the core billing
