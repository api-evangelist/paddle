aid: paddle
url: https://raw.githubusercontent.com/api-evangelist/paddle/refs/heads/main/apis.yml
name: Paddle
kind: company
description: Paddle is a merchant-of-record billing platform for SaaS and digital
  products. The Paddle Billing API manages the full revenue lifecycle - products,
  prices, customers, subscriptions, transactions, invoices, adjustments, and
  discounts - while Paddle handles global sales tax, payment processing, fraud,
  and compliance on the seller's behalf.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Billing
- Payments
- Subscriptions
- Merchant of Record
- SaaS
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
apis:
- aid: paddle:paddle-products-api
  name: Paddle Products API
  tags:
  - Products
  - Catalog
  - Prices
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.paddle.com/api-reference/products/overview
  baseURL: https://api.paddle.com
  properties:
  - url: https://developer.paddle.com/api-reference/products/overview
    type: Documentation
  - url: https://developer.paddle.com/api-reference/products/list-products
    type: APIReference
  - url: openapi/paddle-openapi.yml
    type: OpenAPI
  description: Create, read, and update the products in your Paddle catalog,
    including names, descriptions, tax categories, custom data, and product images.
- aid: paddle:paddle-prices-api
  name: Paddle Prices API
  tags:
  - Prices
  - Pricing
  - Catalog
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.paddle.com/api-reference/prices/overview
  baseURL: https://api.paddle.com
  properties:
  - url: https://developer.paddle.com/api-reference/prices/overview
    type: Documentation
  - url: https://developer.paddle.com/api-reference/prices/list-prices
    type: APIReference
  - url: openapi/paddle-openapi.yml
    type: OpenAPI
  description: Manage one-time and recurring prices for products, including billing
    cycles, trial periods, unit and tiered pricing, country overrides, and a
    pricing-preview endpoint that calculates localized prices and taxes.
- aid: paddle:paddle-customers-api
  name: Paddle Customers API
  tags:
  - Customers
  - Addresses
  - Businesses
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.paddle.com/api-reference/customers/overview
  baseURL: https://api.paddle.com
  properties:
  - url: https://developer.paddle.com/api-reference/customers/overview
    type: Documentation
  - url: https://developer.paddle.com/api-reference/customers/list-customers
    type: APIReference
  - url: openapi/paddle-openapi.yml
    type: OpenAPI
  description: Manage customers and their related addresses and businesses, credit
    balances, customer portal sessions, and authentication tokens used by
    Paddle.js and the customer portal.
- aid: paddle:paddle-subscriptions-api
  name: Paddle Subscriptions API
  tags:
  - Subscriptions
  - Recurring Billing
  - Lifecycle
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.paddle.com/api-reference/subscriptions/overview
  baseURL: https://api.paddle.com
  properties:
  - url: https://developer.paddle.com/api-reference/subscriptions/overview
    type: Documentation
  - url: https://developer.paddle.com/api-reference/subscriptions/list-subscriptions
    type: APIReference
  - url: openapi/paddle-openapi.yml
    type: OpenAPI
  description: Manage the full subscription lifecycle - list, get, and update
    subscriptions, activate trials, pause, resume, cancel, apply one-time
    charges, preview updates and charges, and retrieve payment-method-update
