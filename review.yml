aid: paddle
name: Paddle
review:
  question: Does Paddle expose a documented public WebSocket API?
  answer: false
  date: '2026-06-21'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    Paddle's real-time surface is delivered through outbound HTTP webhooks
    (notifications), not a WebSocket or Server-Sent Events stream. Paddle pushes
    signed event payloads to seller-configured notification destinations and
    also exposes a polling Events API. No AsyncAPI document was created because
    no streaming (WebSocket or SSE) transport is documented; an event-driven
    webhook model could be captured separately if AE scope later calls for it.
findings:
  summary: |
    Paddle does not publish a documented public WebSocket API. The Paddle
    Billing API is a REST (HTTPS) API served from https://api.paddle.com using
    Bearer API key authentication. Real-time delivery is handled by outbound
    webhook notifications configured via the Notifications and Notification
    Settings APIs: Paddle sends signed event payloads (e.g. transaction.completed,
    subscription.updated) to seller HTTPS endpoints. Sellers can also poll the
    Events API and inspect or replay deliveries through the Notifications API.
    No realtime, bidirectional WebSocket (ws:// or wss://) endpoint is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.paddle.com
      documented: true
    - protocol: Webhook
      scheme: https
      note: Outbound, server-to-server HTTP POST notifications to seller-configured destinations, signed for verification. Inbound webhook delivery, not a client-consumable streaming transport.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in Paddle's API reference, notifications, or any product page as of the review date.
