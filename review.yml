sources:
  - url: https://developer.paddle.com/api-reference/overview
    type: APIReference
    note: All documented endpoints are HTTPS REST under https://api.paddle.com; Bearer API key auth; no WebSocket mentioned.
  - url: https://developer.paddle.com/webhooks/overview
    type: Documentation
    note: Real-time delivery is via outbound webhook notifications to seller endpoints, signed for verification; not WebSocket.
  - url: https://developer.paddle.com/api-reference/notifications/overview
    type: APIReference
    note: Notifications and Notification Settings APIs configure and inspect webhook delivery; Events API supports polling.
  - url: https://github.com/PaddleHQ/paddle-openapi
    type: OpenAPI
    note: Paddle publishes an OpenAPI 3.1 description; no WebSocket/AsyncAPI surface present.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Paddle's event delivery is an outbound
    webhook (notification) model, which is in-scope as REST/webhook rather than
    a streaming AsyncAPI transport, so no AsyncAPI document was authored. The
    catalog records the REST API and the webhook notification model only.
