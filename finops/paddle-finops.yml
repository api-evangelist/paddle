meters:
- name: transaction_fee_percentage
  description: Percentage component of the merchant-of-record fee applied to each successful transaction's gross value.
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - transaction
  - currency
- name: transaction_fee_fixed
  description: Fixed per-transaction fee component applied to each successful transaction.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - transaction
- name: refund_adjustments
  description: Refunds and credits issued via adjustments that reduce net revenue.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - transaction
- name: chargeback_adjustments
  description: Chargebacks recorded as adjustments against transactions.
  unit: currency
  aggregation: sum
  dimensions:
  - account
  - transaction
principles:
- name: Visibility
  description: Pull Paddle transaction, adjustment, and reports data; reconcile gross vs. net revenue and effective fee rate per transaction.
- name: Allocation
  description: Use product, price, and custom-data fields to map transactions to internal products and cost centers.
- name: Optimization
  description: Reduce churn-driven failed payments and chargebacks (which carry adjustments); negotiate Custom rates as volume grows; review low-value transactions where the fixed fee is a larger share of revenue.
- name: Accountability
  description: Assign owners per product line; review effective Paddle fee percentage monthly against forecast.
