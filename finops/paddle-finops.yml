description: >-
  FinOps view of Paddle spend. As a merchant of record, Paddle charges a
  percentage plus a fixed fee on each successfully processed transaction
  (Standard rate 5% + $0.50) rather than a platform or per-API-call fee. That
  single charge bundles payment processing, global sales tax and compliance,
  fraud protection, churn recovery, and support. Refunds, credits, and
  chargebacks flow through as adjustments that reduce net revenue. Custom rates
  apply to large or rapidly scaling accounts.
notes: >-
  Cost driver is gross transaction value times the agreed percentage plus the
  per-transaction fixed fee. Verify your negotiated rate and any chargeback or
  currency-conversion handling against your Paddle agreement during
  reconciliation.
